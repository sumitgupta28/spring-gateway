spring:
  application:
    name: spring-cloud-gateway
  cloud:
    gateway:
      routes:
        - id: shopping-cart
          uri: http://localhost:8081
          predicates:
            - Path=/api/carts/**
        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**

server:
  port: 8080

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.sg.spring.gateway: DEBUG
